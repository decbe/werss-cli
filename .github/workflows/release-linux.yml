name: Release Linux Binary

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          mkdir -p dist
          if [ "${{ matrix.target }}" = "x86_64-unknown-linux-gnu" ]; then
            tar -czvf dist/werss-cli-linux-x86_64.tar.gz -C target/${{ matrix.target }}/release werss-cli
            sha256sum dist/werss-cli-linux-x86_64.tar.gz | awk '{print $1}' > dist/werss-cli-linux-x86_64.tar.gz.sha256
          elif [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            tar -czvf dist/werss-cli-linux-aarch64.tar.gz -C target/${{ matrix.target }}/release werss-cli
            sha256sum dist/werss-cli-linux-aarch64.tar.gz | awk '{print $1}' > dist/werss-cli-linux-aarch64.tar.gz.sha256
          fi

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz dist/*.sha256