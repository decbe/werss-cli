name: Release Linux Binary

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Build x86_64
        run: cargo build --release

      - name: Package
        run: |
          mkdir -p dist
          cp target/release/werss-cli dist/werss-cli-linux-x86_64
          tar -czvf dist/werss-cli-linux-x86_64.tar.gz -C dist werss-cli-linux-x86_64
          sha256sum dist/werss-cli-linux-x86_64.tar.gz | awk '{print $1}' > dist/werss-cli-linux-x86_64.tar.gz.sha256

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/werss-cli-linux-x86_64.tar.gz
            dist/werss-cli-linux-x86_64.tar.gz.sha256
          generate_release_notes: true