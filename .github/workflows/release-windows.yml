name: Release Windows Binary

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release

      - name: Package
        run: |
          mkdir -p dist
          powershell -Command "Compress-Archive -Path target/release/werss-cli.exe -DestinationPath dist/werss-cli-windows-x86_64.zip"
          powershell -Command "(Get-FileHash dist/werss-cli-windows-x86_64.zip -Algorithm SHA256).Hash | Set-Content dist/werss-cli-windows-x86_64.zip.sha256"

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip dist/*.sha256